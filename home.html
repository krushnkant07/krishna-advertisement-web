<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Krishna Ads</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Ad Overlay Design */
        #ad-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,1); z-index: 1000; flex-direction: column;
            align-items: center; justify-content: center; color: white;
        }
        .timer-display { font-size: 28px; color: #00ff00; margin-bottom: 15px; font-weight: bold; }
        video, img { max-width: 90%; max-height: 75%; border: 2px solid white; border-radius: 12px; }
        
        /* Dashboard Styling */
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .ad-box { 
            background: #fff; padding: 20px; width: 250px; border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); cursor: pointer; text-align: center;
        }
        .ad-box:hover { background: #f0f0f0; transform: scale(1.02); }
    </style>
</head>
<body>
    <header>
        <h1>Krishna Advertisement</h1>
        <nav><a href="home.html">Home</a> | <a href="earning.html">Earning</a></nav>
    </header>

    <div class="container">
        <div class="ad-box" onclick="playRandomAd('reel')">
            <h3>Watch Random Reel</h3>
            <p>Earn ₹0.10 | 30s</p>
        </div>

        <div class="ad-box" onclick="playRandomAd('post')">
            <h3>View Random Post</h3>
            <p>Earn ₹0.06 | 10s</p>
        </div>

        <div class="ad-box" onclick="playRandomAd('movie')">
            <h3>Short Movie Ad</h3>
            <p>Earn ₹0.50 | 2m</p>
        </div>
    </div>

    <div id="ad-overlay">
        <div class="timer-display">Time Remaining: <span id="countdown">0</span>s</div>
        <div id="ad-content"></div>
        <p>Do not close the page to receive reward.</p>
    </div>

    <script>
        // --- APNI FILES KI LIST YAHAN UPDATE KAREIN ---
        const adDatabase = {
            post: ["1b0536ece6d7c04180ec9bfbc772d2e1.jpg", "221147ea2778af9c1e6c82761e47d01c.jpg", "580fba1deafcf017acd880984461296a.jpg", "787756e0bf5c8282e44ef4471a2874dc.jpg","IMG-20260307-WA0003.jpg", "InShot_20260311_082602526.jpg", "InShot_20260413_213048735.jpg"], 
            reel: ["video1.mp4"],
            movie: ["short1.mp4"]
        };

        function playRandomAd(type) {
            // Check seen ads
            let seenAds = JSON.parse(localStorage.getItem(`seen_${type}`)) || [];
            let availableAds = adDatabase[type].filter(ad => !seenAds.includes(ad));

            if (availableAds.length === 0) {
                alert(`Aapne saari available ${type}s dekh li hain!`);
                return;
            }

            // Random selection
            let randomAd = availableAds[Math.floor(Math.random() * availableAds.length)];
            
            // Path setup - folders ka naam check kar lein
            let folderMap = { reel: 'reels', post: 'post', movie: 'short-movie' };
            let path = `upload-add/${folderMap[type]}/${randomAd}`;
            let duration = type === 'reel' ? 30 : (type === 'post' ? 10 : 120);

            console.log("Loading path: " + path); // Debugging ke liye
            startAdPlayer(type, path, duration, randomAd);
        }

        function startAdPlayer(type, src, duration, adFileName) {
            const overlay = document.getElementById('ad-overlay');
            const content = document.getElementById('ad-content');
            const timerText = document.getElementById('countdown');
            
            overlay.style.display = 'flex';
            let timeLeft = duration;
            timerText.innerText = timeLeft;

            // Media insertion
            if (type === 'post') {
                content.innerHTML = `<img src="${src}" onerror="fileError('${src}')">`;
            } else {
                content.innerHTML = `<video id="v" src="${src}" autoplay muted playsinline onerror="fileError('${src}')"></video>`;
            }

            const interval = setInterval(() => {
                timeLeft--;
                timerText.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    finishAd(type, adFileName);
                }
            }, 1000);
        }

        function finishAd(type, adFileName) {
            // Mark as seen
            let seenAds = JSON.parse(localStorage.getItem(`seen_${type}`)) || [];
            seenAds.push(adFileName);
            localStorage.setItem(`seen_${type}`, JSON.stringify(seenAds));

            // Reward calculation
            let reward = type === 'reel' ? 0.10 : (type === 'post' ? 0.06 : 0.50);
            let bal = parseFloat(getCookie("balance")) || 0;
            setCookie("balance", (bal + reward).toFixed(2));

            alert(`Mubarak ho! ₹${reward} add ho gaye hain.`);
            window.location.href = "earning.html";
        }

        function fileError(src) {
            alert("File nahi mili! Path check karein: " + src);
            location.reload();
        }

        // Cookie Functions (1 Year Expiry)
        function setCookie(n, v) {
            const d = new Date(); d.setTime(d.getTime() + (365*24*60*60*1000));
            document.cookie = `${n}=${v};expires=${d.toUTCString()};path=/`;
        }

        function getCookie(n) {
            let b = document.cookie.match('(^|;)\\s*' + n + '\\s*=\\s*([^;]+)');
            return b ? b.pop() : "0.00";
        }
    </script>
</body>
</html>
