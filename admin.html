<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Krishna Ads</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #28a745; --bg: #f4f7f6; }
        body { background: var(--bg); font-family: sans-serif; margin: 0; }
        header { background: #333; color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; }
        
        .notification-bell { position: relative; cursor: pointer; font-size: 20px; }
        .badge { position: absolute; top: -5px; right: -8px; background: red; color: white; font-size: 10px; padding: 2px 6px; border-radius: 50%; }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 15px; }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .table-container { background: white; border-radius: 15px; overflow-x: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #666; font-size: 13px; }
        
        .status-btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-pay { background: #007bff; color: white; }
        .paid-tag { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h3><i class="fas fa-user-shield"></i> KRISHNA ADMIN</h3>
        <div class="notification-bell" onclick="scrollToTable()">
            <i class="fas fa-bell"></i>
            <span class="badge" id="notif-count">0</span>
        </div>
    </header>

    <div class="container">
        <div class="stats-row">
            <div class="stat-card">
                <i class="fas fa-wallet" style="color:#28a745;"></i>
                <h4>Pending</h4>
                <p id="total-pending">₹0.00</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-check-circle" style="color:#007bff;"></i>
                <h4>Paid Today</h4>
                <p id="total-paid">₹0.00</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-users" style="color:#333;"></i>
                <h4>Total User</h4>
                <p>1 (Active)</p>
            </div>
        </div>

        <div class="table-container">
            <div style="padding:15px; font-weight:bold; border-bottom:1px solid #eee;">Withdrawal Notifications</div>
            <table>
                <thead>
                    <tr>
                        <th>User & Time</th>
                        <th>Amount</th>
                        <th>Payment Details</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Security Check
        if(sessionStorage.getItem('isAdminLoggedIn') !== 'true') window.location.href = 'admin_login.html';

        function loadDashboard() {
            const requests = JSON.parse(localStorage.getItem('admin_notifications')) || [];
            const tableBody = document.getElementById('admin-table-body');
            let pendingAmt = 0;
            let paidAmt = 0;
            let pendingCount = 0;

            tableBody.innerHTML = "";

            requests.reverse().forEach((req, index) => {
                const isPaid = req.status === "Paid";
                if(!isPaid) {
                    pendingAmt += parseFloat(req.amount);
                    pendingCount++;
                } else {
                    paidAmt += parseFloat(req.amount);
                }

                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${req.user}</b><br><small>${req.time}</small></td>
                    <td style="color:${isPaid ? '#28a745' : 'red'}; font-weight:bold;">₹${req.amount}</td>
                    <td><b>${req.method}</b><br>${req.mobile}</td>
                    <td>
                        ${isPaid ? '<span class="paid-tag">✓ Success</span>' : 
                        `<button class="status-btn btn-pay" onclick="markAsPaid(${requests.length - 1 - index}, ${req.amount})">Pay Now</button>`}
                    </td>
                `;
                tableBody.appendChild(tr);
            });

            document.getElementById('total-pending').innerText = "₹" + pendingAmt.toFixed(2);
            document.getElementById('total-paid').innerText = "₹" + paidAmt.toFixed(2);
            document.getElementById('notif-count').innerText = pendingCount;
        }

        function markAsPaid(originalIndex, amt) {
            if(confirm(`Kya aapne ₹${amt} bhej diye hain?`)) {
                let requests = JSON.parse(localStorage.getItem('admin_notifications'));
                requests[originalIndex].status = "Paid";
                localStorage.setItem('admin_notifications', JSON.stringify(requests));
                loadDashboard();
            }
        }

        function scrollToTable() { window.scrollTo({ top: 500, behavior: 'smooth' }); }

        window.onload = loadDashboard;
        // Auto Refresh every 30 seconds
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
