<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Krishna Ads</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-container { max-width: 500px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-item { background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #eee; }
        .stat-item b { font-size: 20px; color: #28a745; display: block; }
        .feedback-area { margin-top: 25px; border-top: 1px solid #ddd; padding-top: 15px; }
        textarea { width: 100%; height: 70px; margin-top: 10px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; }
        .btn-send { width: 100%; background: #007bff; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>
    <header>
        <h1>My Profile</h1>
        <nav><a href="home.html">Home</a> | <a href="earning.html">Wallet</a></nav>
    </header>

    <div class="profile-container">
        <div style="text-align: center;">
            <h2 id="p-name">Loading...</h2>
            <p id="p-mobile" style="color: #666;"></p>
        </div>

        <div class="stats-grid">
            <div class="stat-item"><b>₹<span id="p-bal">0.00</span></b>Balance</div>
            <div class="stat-item"><b id="p-reels">0</b>Reels Watched</div>
            <div class="stat-item"><b id="p-posts">0</b>Posts Viewed</div>
            <div class="stat-item"><b id="p-movies">0</b>Movies Watched</div>
        </div>

        <div class="stat-item" style="margin-top: 10px; background: #fff3cd;">
            <b id="p-watchtime">0m 0s</b>
            Total Watch Time
        </div>

        <div class="feedback-area">
            <h4>Send Feedback to Admin</h4>
            <textarea id="f-text" placeholder="Type your message here..."></textarea>
            <button class="btn-send" onclick="submitFeedback()">Send Feedback</button>
        </div>
    </div>

    <script>
        function getCookie(n) {
            let b = document.cookie.match('(^|;)\\s*' + n + '\\s*=\\s*([^;]+)');
            return b ? b.pop() : null;
        }

        // Load Details
        const user = JSON.parse(decodeURIComponent(getCookie("user_profile") || "{}"));
        document.getElementById('p-name').innerText = user.name || "User";
        document.getElementById('p-mobile').innerText = user.mobile || "";
        document.getElementById('p-bal').innerText = getCookie("balance") || "0.00";

        // Stats & Watch Time Calculation
        let r = JSON.parse(localStorage.getItem('seen_reel')) || [];
        let p = JSON.parse(localStorage.getItem('seen_post')) || [];
        let m = JSON.parse(localStorage.getItem('seen_movie')) || [];

        document.getElementById('p-reels').innerText = r.length;
        document.getElementById('p-posts').innerText = p.length;
        document.getElementById('p-movies').innerText = m.length;

        // Total Time: Reel(30s), Post(10s), Movie(120s)
        let totalSeconds = (r.length * 30) + (p.length * 10) + (m.length * 120);
        let mins = Math.floor(totalSeconds / 60);
        let secs = totalSeconds % 60;
        document.getElementById('p-watchtime').innerText = `${mins}m ${secs}s`;

        function submitFeedback() {
            let msg = document.getElementById('f-text').value;
            if(!msg) return;
            // Feedback save logic (LocalStorage for Admin display)
            let feeds = JSON.parse(localStorage.getItem('admin_feeds')) || [];
            feeds.push({ user: user.name, text: msg, time: new Date().toLocaleString() });
            localStorage.setItem('admin_feeds', JSON.stringify(feeds));
            alert("Feedback sent successfully!");
            document.getElementById('f-text').value = "";
        }
    </script>
</body>
  </html>
