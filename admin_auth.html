<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Auth - Krishna Ads</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .auth-card { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        .logo { color: #28a745; font-size: 24px; font-weight: bold; margin-bottom: 20px; display: block; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 13px; font-weight: bold; color: #555; margin-left: 5px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #28a745; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-login { background: #28a745; color: white; }
        .btn-signup { background: #333; color: white; }
        
        .toggle-text { margin-top: 15px; font-size: 13px; color: #007bff; cursor: pointer; display: block; }
    </style>
</head>
<body>

    <div class="auth-card" id="login-box">
        <span class="logo">KRISHNA ADMIN</span>
        <h3>Welcome Back</h3>
        <div class="input-group">
            <label>Admin Email</label>
            <input type="email" id="l-email" placeholder="admin@krishna.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="l-pass" placeholder="••••••••">
        </div>
        <button class="btn btn-login" onclick="login()">Login Dashboard</button>
        <span class="toggle-text" onclick="toggleForm()">New Admin? Create Account</span>
    </div>

    <div class="auth-card" id="signup-box" style="display:none;">
        <span class="logo">ADMIN SIGNUP</span>
        <h3>Setup Admin</h3>
        <div class="input-group">
            <label>Enter Admin Email</label>
            <input type="email" id="s-email" placeholder="yourname@gmail.com">
        </div>
        <div class="input-group">
            <label>Create Secure Password</label>
            <input type="password" id="s-pass" placeholder="Minimum 6 chars">
        </div>
        <button class="btn btn-signup" onclick="signup()">Register as Admin</button>
        <span class="toggle-text" onclick="toggleForm()">Already Admin? Login</span>
    </div>

    <script>
        // Form Toggle Logic
        function toggleForm() {
            const loginBox = document.getElementById('login-box');
            const signupBox = document.getElementById('signup-box');
            if(loginBox.style.display === "none") {
                loginBox.style.display = "block";
                signupBox.style.display = "none";
            } else {
                loginBox.style.display = "none";
                signupBox.style.display = "block";
            }
        }

        // Signup Logic (LocalStorage based)
        function signup() {
            const email = document.getElementById('s-email').value;
            const pass = document.getElementById('s-pass').value;

            if(!email || pass.length < 6) {
                alert("Please enter valid email and 6-digit password!");
                return;
            }

            const adminData = { email: email, pass: pass };
            localStorage.setItem('krishna_admin_data', JSON.stringify(adminData));
            alert("Admin Registered Successfully! Now Login.");
            toggleForm();
        }

        // Login Logic
        function login() {
            const email = document.getElementById('l-email').value;
            const pass = document.getElementById('l-pass').value;
            const storedAdmin = JSON.parse(localStorage.getItem('krishna_admin_data'));

            if(!storedAdmin) {
                alert("No Admin Found! Create account first.");
                return;
            }

            if(email === storedAdmin.email && pass === storedAdmin.pass) {
                // Session set karna taki admin page secure rahe
                sessionStorage.setItem('isAdminLoggedIn', 'true');
                alert("Login Successful!");
                window.location.href = 'admin.html'; // Directing to dashboard
            } else {
                alert("Invalid Email or Password!");
            }
        }
    </script>
</body>
</html>
