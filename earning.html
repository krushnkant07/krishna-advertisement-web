<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Earnings - Krishna Ads</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .earning-card {
            background: #fff;
            padding: 25px;
            margin: 20px auto;
            width: 90%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .balance-amount {
            font-size: 32px;
            color: #28a745;
            font-weight: bold;
            margin: 10px 0;
        }
        .qr-section {
            display: none; /* Default hidden, show on withdraw click */
            margin-top: 20px;
            padding: 15px;
            border: 2px dashed #ccc;
            border-radius: 10px;
        }
        .qr-placeholder {
            width: 200px;
            height: 200px;
            background: #eee;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ddd;
        }
        .withdraw-btn {
            background: #007bff;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Krishna Ads</h1>
        <nav>
            <a href="home.html">Home</a>
            <a href="earning.html">Earning</a>
            <a href="profile.html">Profile</a>
        </nav>
    </header>

    <div class="earning-card">
        <h3>Total Earning</h3>
        <p class="balance-amount">₹<span id="display-balance">0.00</span></p>
        <p style="color: #666; font-size: 14px;">10 Paisa added for last view</p>
        
        <button class="withdraw-btn" onclick="generateWithdrawQR()">Withdraw Amount</button>

        <div id="qr-area" class="qr-section">
            <h4>Scan to Request Payment</h4>
            <div class="qr-placeholder">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=PAYMENT_REQUEST_USER" alt="QR Code">
            </div>
            <p style="font-size: 12px; color: red;">Take a screenshot and send to Admin</p>
        </div>
    </div>

    <script>
        // Cookie se balance nikalne ka function
        function getCookie(name) {
            let nameEQ = name + "=";
            let ca = document.cookie.split(';');
            for(let i=0;i < ca.length;i++) {
                let c = ca[i].trim();
                if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
            }
            return "0.00";
        }

        // Page load hote hi balance update karein
        document.getElementById('display-balance').innerText = getCookie("balance");

        function generateWithdrawQR() {
            let balance = parseFloat(getCookie("balance"));
            if(balance < 1) {
                alert("Minimum ₹1 balance chahiye withdraw ke liye.");
            } else {
                document.getElementById('qr-area').style.display = 'block';
                alert("QR Code generate ho gaya hai. Isse scan karke admin ko bhej dein.");
            }
        }
    </script>
</body>
</html>
